primary: product-manager
personas:
  - id: product-manager
    type: internal_reviewer
    flow: onboarding
    goals:
      experience:
        - Quickly compare generated flows and screens.
        - Spot blocker states without leaving the blueprint viewer.
      end:
        - Decide whether a run is ready for handoff.
    frustrations:
      - Hidden edge cases in generated UX artifacts.
      - Switching context between personas and flow graph views.
  - id: accessibility-reviewer
    type: specialist_reviewer
    flow: recovery
    goals:
      experience:
        - Verify keyboard and empty-state behavior visually.
        - Read the handoff without raw markdown noise.
      end:
        - Confirm accessibility risks are visible before implementation.
    frustrations:
      - Dense graphs without severity context.
      - Markdown artifacts that hide tables and diagrams.
  - id: engineer-handoff
    type: implementation_owner
    flow: onboarding
    goals:
      experience:
        - Understand which screens map to which implementation tasks.
        - See terminal and missing-screen states clearly.
      end:
        - Start implementation from a concise handoff.
    frustrations:
      - Handoff docs without screen references.
      - Runs that silently point at the wrong blueprint.
