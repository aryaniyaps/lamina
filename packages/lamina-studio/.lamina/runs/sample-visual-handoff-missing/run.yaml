id: sample-visual-handoff-missing
hook: audit
command: /lamina-audit studio missing handoff
blueprint_id: sample-visual-blueprint-v1
flows_touched:
  - onboarding
flows:
  - id: onboarding
    name: Handoff missing flow
    status: planned
    priority: P2
    graphs:
      - id: onboarding
        entry_screen: start
        transitions:
          - trigger: open-flow
            from: start
            target: terminal
screens:
  - id: start
    title: Run Overview
    status: existing
    source: screens/start.tsx
  - id: terminal
    title: Terminal State
    status: existing
    source: screens/terminal.tsx
scenarios: []
findings:
  - id: handoff-missing-empty-state
    priority: medium
    finding: Missing handoff files should disable or empty-state the Handoff tab without breaking Artifacts.
    impact: Reviewers understand which run outputs are available.
    effort: low
    recommendation: Preserve Artifacts access and show clear missing-handoff state.
    screen_id: start
    flow_id: onboarding
artifacts:
  - id: report-only-note
    type: usability_findings_report
    pack: validation
    path: artifacts/report-only-note.md
    confidence: low
    evidence_mode: assumption_allowed
