id: sample-visual-complete
hook: design
command: /lamina-design studio visual complete
blueprint_id: sample-visual-blueprint-v1
flows_touched:
  - onboarding
  - recovery
flows:
  - id: onboarding
    name: Onboarding happy path
    status: draft
    priority: P0
    routes:
      - /start
      - /flow-map
      - /artifact-review
      - /terminal
    graphs:
      - id: onboarding
        entry_screen: start
        transitions:
          - trigger: open-flow
            from: start
            target: flow-map
          - trigger: review-artifacts
            from: start
            target: artifact-review
          - trigger: inspect-screen
            from: flow-map
            target: artifact-review
          - trigger: finish
            from: artifact-review
            target: terminal
  - id: recovery
    name: Recovery and empty states
    status: planned
    priority: P1
    routes:
      - /empty-state
      - /recovery
      - /terminal
    graphs:
      - id: recovery
        entry_screen: empty-state
        transitions:
          - trigger: recover
            from: empty-state
            target: recovery
          - trigger: resolve
            from: recovery
            target: terminal
screens:
  - id: start
    title: Run Overview
    status: new
    regions: [header, metrics, actions]
  - id: flow-map
    title: Flow Map
    status: new
    regions: [graph, table, actions]
  - id: artifact-review
    title: Artifact Review
    status: new
    regions: [summary, markdown, actions]
  - id: empty-state
    title: Empty State
    status: new
    regions: [empty, recovery]
  - id: recovery
    title: Recovery Path
    status: new
    regions: [form, support]
  - id: terminal
    title: Terminal State
    status: new
    regions: [summary]
scenarios:
  - id: artifact-mermaid-table
    title: Artifact includes table and Mermaid
    screen: artifact-review
    flow: onboarding
    description: Markdown viewer should render prose and tables while Mermaid source stays visible below.
    severity: medium
    category: partial
    ux: alternate_flow
    trigger:
      operation: review
      subject: artifact markdown
      when: dependency_unavailable
  - id: persona-blocked-empty
    title: Persona is blocked by empty state
    screen: empty-state
    flow: recovery
    description: Active persona blocker marker should appear on the empty-state node.
    severity: high
    category: empty
    ux: empty_state
    trigger:
      operation: recover
      subject: missing screens
      when: collection_empty
  - id: branch-from-overview
    title: Overview branches to artifacts
    screen: start
    flow: onboarding
    description: Scenario node should anchor under the overview screen.
    severity: low
    category: partial
    ux: alternate_flow
    trigger:
      operation: branch
      subject: start screen
      when: state_disallows
simulation:
  results:
    - persona_id: product-manager
      outcome: success
      blockers: []
    - persona_id: accessibility-reviewer
      outcome: partial_fail
      blockers:
        - step: empty-state
          screenId: empty-state
          severity: high
          quote: I need a clearer path when no generated screens exist.
    - persona_id: engineer-handoff
      outcome: partial_fail
      blockers:
        - step: artifact-review
          screenId: artifact-review
          severity: medium
          quote: I need the handoff to point to exact implementation files.
artifacts:
  - id: visual-flow-pack
    type: wireflow
    pack: flow
    path: artifacts/flow-pack.md
    confidence: high
    evidence_mode: simulation_or_evidence
    diagram: mermaid
  - id: visual-markdown-pack
    type: usability_findings_report
    pack: validation
    path: artifacts/markdown-pack.md
    confidence: medium
    evidence_mode: assumption_allowed
    diagram: mermaid
