version: 1

evidence_modes:
  evidence_required: Requires real research, analytics, audit, or testing evidence. Block or emit a plan/template when missing.
  assumption_allowed: May be produced from business context and labeled assumptions only after the clarify gate passes or the user explicitly proceeds with unanswered questions.
  simulation_or_evidence: May use persona simulation or real research; label which one was used.
  run_yaml_required: Must be derived from `.lamina/runs/<run_id>/run.yaml`.

diagram_types:
  flowchart: Mermaid flowchart.
  flowchart_with_subgraphs: Mermaid flowchart using subgraphs for swimlanes or system layers.
  journey: Mermaid journey diagram.
  timeline: Mermaid timeline diagram.
  stateDiagram-v2: Mermaid state diagram.
  sequenceDiagram: Mermaid sequence diagram.
  classDiagram: Mermaid class diagram for content/type relationships only.
  quadrantChart: Mermaid quadrant chart.
  mindmap: Mermaid mindmap.

defaults:
  optional_inputs: [business_context, personas_yaml, prior_runs, explicit_user_assumptions]
  confidence_policy: Evidence-required artifacts without evidence must be marked blocked or low confidence.

artifacts:
