id: demo
hook: concept
target: demo blueprint
command: /lamina-design
blueprint_id: demo
flows_touched: [main, add-items]
personas_updated: false
started_at: 2026-07-05

flows:
  - id: main
    name: Main checkout
    status: draft
    routes: ["/login", "/dashboard", "/orders"]
    graphs:
      - id: main
        entry_screen: login
        transitions:
          - trigger: sign-in
            from: login
            target: dashboard
          - trigger: view-orders
            from: dashboard
            target: orders
  - id: add-items
    name: Add items
    status: draft
    routes: ["/login", "/dashboard", "/orders"]
    graphs:
      - id: add-items
        entry_screen: login
        transitions:
          - trigger: sign-in
            from: login
            target: dashboard
          - trigger: add-item
            from: dashboard
            target: orders

screens:
  - id: login
    title: Login
    status: new
    regions: [main]
    elements:
      - component: Heading
        text: Sign in
        level: 1
      - component: Form
      - component: Field
        name: email
        label: Email
      - component: Field
        name: password
        label: Password
      - component: Button
        label: Sign in
        trigger: sign-in
  - id: dashboard
    title: Dashboard
    status: new
    regions: [main]
    elements:
      - component: Heading
        text: Dashboard
        level: 1
      - component: Button
        label: View orders
        trigger: view-orders
      - component: Button
        label: Add item
        trigger: add-item
  - id: orders
    title: Orders
    status: new
    regions: [main]
    elements:
      - component: Heading
        text: Orders
        level: 1
      - component: Table
        source: orders

scenarios:
  - id: empty-orders
    title: No orders yet
    screen: orders
    flow: main
    description: User lands on orders before any exist
    severity: medium
    category: empty
    trigger:
      operation: view orders
      subject: orders
      when: collection_empty
    ux: empty_state

simulation:
  panel: [deal-hunter-diane, power-user-pete]
  results:
    - persona_id: deal-hunter-diane
      outcome: partial_fail
      blockers:
        - step: orders
          screen_id: orders
          flow_id: main
          severity: high
          quote: "I can't tell if my order went through."
    - persona_id: power-user-pete
      outcome: partial_fail
      blockers:
        - step: dashboard
          screen_id: dashboard
          flow_id: main
          severity: medium
          quote: "Why do I need to click through so many screens to add one item?"
  confidence: medium
