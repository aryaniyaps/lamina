# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: LaminaBench LLM judge scoring (product-behavior rubric)

prompts:
  - |
    You are an expert product-behavior evaluator scoring a generated design artifact against a golden reference specification.

    ## Task description
    {{description}}

    ## Context
    {{context}}

    ## Golden reference (evaluation checklist — not expected verbatim output)
    {{golden}}

    ## Generated artifact to score
    {{artifact}}

    Score the artifact on these criteria (1-5 each). Penalize shallow UX checklists without domain invariants, scenarios, or trade-offs. Do not reward invented interviews, fake analytics, or workshop theater.
    Return STRICT JSON only:
    {
      "domain_system_structure": <1-5>,
      "invariants_product_rules": <1-5>,
      "actors_permissions": <1-5>,
      "workflow_quality": <1-5>,
      "scenario_edge_coverage": <1-5>,
      "systems_judgment": <1-5>,
      "ux_expression_under_rules": <1-5>,
      "brownfield_fit": <1-5>,
      "implementation_readiness": <1-5>,
      "overall_product_behavior": <1-5>,
      "evidence": "<brief justification>"
    }

providers:
  - id: openai:gpt-4o
    config:
      temperature: 0
  - id: anthropic:messages:claude-sonnet-4-20250514
    config:
      temperature: 0

defaultTest:
  options:
    provider: openai:gpt-4o
  assert:
    - type: is-json
    - type: javascript
      value: |
        const s = JSON.parse(output);
        const keys = ['domain_system_structure','invariants_product_rules','actors_permissions','workflow_quality','scenario_edge_coverage','systems_judgment','ux_expression_under_rules','brownfield_fit','implementation_readiness','overall_product_behavior'];
        return keys.every(k => typeof s[k] === 'number' && s[k] >= 1 && s[k] <= 5);

tests: []
