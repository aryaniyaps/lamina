version: "1.0.0"
release_tag: bench-v1
created: "2026-07-11"
harness_version: "1.7.0"
# Bump ONLY when successful prior results must be invalidated (gates/prompts/scoring contract).
results_contract_version: "2.3.0"
rubric_version: "structured-behavior-v4"

# Matched phased runner — see benchmarks/METHODOLOGY.md (Design C)
runner: matched-phased

agent: codex
# Authoritative Codex model pin. CODEX_MODEL must match unless
# LAMINA_BENCH_ALLOW_MODEL_OVERRIDE=1.
model: gpt-5.6-sol
codex_cli_version: "0.144.5"
container_base_image: "node:20-bookworm-slim@sha256:2cf067cfed83d5ea958367df9f966191a942351a2df77d6f0193e162b5febfc0"
# Intent only — the Codex CLI exposes reasoning effort, not sampling controls.
temperature: 0
top_p: 1.0
max_tokens: 8192
runs_per_arm: 1
# Target for publishable core or explicitly task-scoped results.
runs_per_arm_publish: 3
publish_suite: core
# Frozen deterministic seed for task order and within-pair arm order. Publish
# runs are counterbalanced rather than always running control first.
schedule_seed: "bench-v1-design-c-2026-07-16"
tasks_total: 10
tasks_published: 5
trials_per_task: 2
# Full corpus dev default: 10 tasks × 2 arms × 1 run = 20 trials
trials_total: 20
# Published v1 core: 5 tasks × 2 arms × 1 run = 10 trials (×3 publish = 30)
trials_total_published: 10
trials_total_publish: 30

# Matched multi-phase harness. Both arms receive the same five phases and the
# same whole-trial safety limit; Codex itself decides how many turns each phase needs.
phases_per_trial: 5
# A single two-hour safety ceiling catches genuinely wedged trials without biasing
# individual planning, implementation, review, or fix phases. The Codex control
# smoke test was still productively editing when a one-hour ceiling fired.
agent_timeout_sec: 7200
verifier_timeout_sec: 900
quality_timeout_sec: 900
# Subscription judge retries.
judge_max_attempts: 2
judge_retry_delay_sec: 2

methodology:
  id: design_c_ecological_matched_phases
  document: benchmarks/METHODOLOGY.md
  machine_readable: benchmarks/methodology.json
  research_question: >-
    On the same product brief, does the Lamina loop (init → design → implement →
    verify → fix) beat an equally scaffolded generic plan → review loop on
    implemented product behavior?
  paired_conditions: true
  ecological_loop: true

scoring_weights:
  strict_dimensions: 0.65
  item_coverage: 0.35

claim_surface: "arm-blind structured behavior judge on application source: 65% strict dimensions + 35% item coverage, with independent quality caps"

llm_judges:
  - "openai/gpt-5.6-sol"

categories:
  - greenfield
  - oss_feature
  - oss_audit
  - workflow_edge
  - resilience

oss_pins:
  commerce:
    repo: vercel/commerce
    commit: 3761e52e60df9c6a316e067dbfd7032e494d3634
    fixture_kind: vendored_full
  plane:
    repo: makeplane/plane
    commit: dc9d80b2d2a499b967f0b541e083b283f463719f
    ref: preview
    fixture_kind: vendored_full
  outline:
    repo: outline/outline
    commit: 30730179b852d42da5078a9294f7d05a44f516b7
    ref: main
    fixture_kind: vendored_full
