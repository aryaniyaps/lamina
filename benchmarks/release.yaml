version: "2.0.0"
release_tag: bench-v2.0.0
created: "2026-07-10"

# Default pin for the public leaderboard. Multi-agent pilots: pass --agent to run-bench.
# Do not claim model independence from a single pin.
agent: claude-code
model: claude-sonnet-4-20250514
temperature: 0
top_p: 1.0
max_tokens: 8192

runs_per_arm: 3
tasks_total: 25
workflow_runs_total: 150
control_phases: 2
treatment_phases: 5
control_invocations_total: 150
treatment_invocations_total: 375
agent_invocations_total: 525

# Ecological adoption comparison — see benchmarks/METHODOLOGY.md (not matched-turn ablation)
methodology:
  id: design_a_ecological
  document: benchmarks/METHODOLOGY.md
  machine_readable: benchmarks/methodology.json
  research_question: >-
    Does adopting Lamina (full agent-native loop) yield better implemented
    product behavior than Plan mode + implement — the realistic without-Lamina path?
  unequal_turns_intentional: true
  control_scoring: post_implement
  treatment_scoring: post_fix

human_eval_tasks: 10
human_raters: 3

scoring_weights:
  golden_coverage: 0.4
  llm_judge: 0.4
  human_eval: 0.2

# required_sections intentionally omitted — format-neutral (avoids Lamina-shaped bias)
golden_field_weights:
  required_invariants: 2
  required_entities: 2
  required_scenarios: 2
  required_tradeoffs: 2
  required_personas: 1
  required_flows: 1
  required_rules: 1
  required_edge_cases: 1
  required_a11y: 1
  required_findings: 1

llm_judges:
  - openai:gpt-4o
  - anthropic:claude-sonnet-4-20250514

categories:
  - greenfield
  - oss_feature
  - oss_audit
  - workflow_edge
  - resilience

# Fixture honesty: commerce = full vendored repo; plane/outline = context stubs only
oss_pins:
  commerce:
    repo: vercel/commerce
    commit: main
    fixture_kind: vendored_full
  plane:
    repo: makeplane/plane
    commit: develop
    fixture_kind: context_stub
  outline:
    repo: outline/outline
    commit: main
    fixture_kind: context_stub
