version: "1.0.0"
release_tag: bench-v1
created: "2026-07-11"
harness_version: "1.0.0"
# Bump ONLY when successful prior results must be invalidated (gates/prompts/scoring contract).
results_contract_version: "1.1.0"

# Harbor runner — see benchmarks/METHODOLOGY.md (Design B)
runner: harbor
harbor_prompt_template: benchmarks/harbor/prompt_template.j2

agent: claude-code
model: claude-sonnet-4-20250514
temperature: 0
top_p: 1.0
max_tokens: 8192

runs_per_arm: 3
tasks_total: 25
trials_per_task: 2
# 25 tasks × 2 arms × 3 runs = 150 trials
trials_total: 150

# Agent timeout for one continuous rollout (seconds)
agent_timeout_sec: 5400
verifier_timeout_sec: 600

methodology:
  id: design_b_skillsbench_paired
  document: benchmarks/METHODOLOGY.md
  machine_readable: benchmarks/methodology.json
  research_question: >-
    Given the same product brief, does Lamina (skills + workflow conventions)
    yield better implemented product behavior than no Lamina skills?
  paired_conditions: true
  skillsbench_style: true

scoring_weights:
  golden_coverage: 0.5
  llm_judge: 0.5

claim_surface: "golden_coverage + llm_judge on implemented source (Design B)"

golden_field_weights:
  required_invariants: 2
  required_entities: 2
  required_scenarios: 2
  required_tradeoffs: 2
  required_personas: 1
  required_flows: 1
  required_rules: 1
  required_edge_cases: 1
  required_a11y: 1
  required_findings: 1

llm_judges:
  - "anthropic:claude-sonnet-4-20250514"

categories:
  - greenfield
  - oss_feature
  - oss_audit
  - workflow_edge
  - resilience

oss_pins:
  commerce:
    repo: vercel/commerce
    commit: 3761e52e60df9c6a316e067dbfd7032e494d3634
    fixture_kind: vendored_full
  plane:
    repo: makeplane/plane
    commit: dc9d80b2d2a499b967f0b541e083b283f463719f
    ref: preview
    fixture_kind: vendored_full
  outline:
    repo: outline/outline
    commit: 30730179b852d42da5078a9294f7d05a44f516b7
    ref: main
    fixture_kind: vendored_full
