version: "1.0.0"
release_tag: bench-v1
created: "2026-07-11"
harness_version: "1.2.0"
# Bump ONLY when successful prior results must be invalidated (gates/prompts/scoring contract).
results_contract_version: "1.9.0"

# Matched phased runner — see benchmarks/METHODOLOGY.md (Design C)
runner: matched-phased

agent: claude-code
# Authoritative model pin. Env ANTHROPIC_MODEL must match unless LAMINA_BENCH_ALLOW_MODEL_OVERRIDE=1.
model: lx1-sonnet-4.6
# Intent only — Claude Code CLI does not expose temperature/top_p/max_tokens in print mode.
temperature: 0
top_p: 1.0
max_tokens: 8192
runs_per_arm: 1
# Target for publishable results; use --runs 3 at release time.
runs_per_arm_publish: 3
tasks_total: 10
tasks_published: 5
trials_per_task: 2
# Full corpus dev default: 10 tasks × 2 arms × 1 run = 20 trials
trials_total: 20
# Published v1 core: 5 tasks × 2 arms × 1 run = 10 trials (×3 publish = 30)
trials_total_published: 10
trials_total_publish: 30

# Matched multi-phase harness (5 phases × per-phase turns, equal both arms).
# Tight budgets: trials must finish in minutes, not hang on API/subagent waits.
# 20 turns/phase burned on design required-reads before emit; 35 keeps the trial
# fast under the 600s hard wall while remaining achievable for ready_to_build.
phases_per_trial: 5
max_turns_per_phase: 35
# Hard wall-clock for the whole agent container (GNU timeout).
# Brief-full design (all primary flows + ship pack) regularly exceeds 240s/phase;
# 900s keeps ~15m trials while leaving room for implement/verify/fix.
agent_timeout_sec: 900
# Per-phase wall-clock inside the harness (kills hung claude print turns).
phase_timeout_sec: 300
# Background-subagent wait ceiling in Claude Code print mode (was 600000 → 10m hangs).
bg_wait_ceiling_ms: 30000
verifier_timeout_sec: 180
agent_max_turns: 175
# Rewardkit judge retries (transient gateway only).
rewardkit_max_attempts: 2
rewardkit_retry_delay_sec: 2

methodology:
  id: design_c_ecological_matched_phases
  document: benchmarks/METHODOLOGY.md
  machine_readable: benchmarks/methodology.json
  research_question: >-
    On the same product brief, does the Lamina loop (init → design → implement →
    verify → fix) beat an equally scaffolded generic plan → review loop on
    implemented product behavior?
  paired_conditions: true
  ecological_loop: true

scoring_weights:
  llm_judge: 1.0

claim_surface: "llm_judge on implemented source (checklist as behavioral rubric; Design C Option D)"

llm_judges:
  - "anthropic/lx1-sonnet-4.6"

categories:
  - greenfield
  - oss_feature
  - oss_audit
  - workflow_edge
  - resilience

oss_pins:
  commerce:
    repo: vercel/commerce
    commit: 3761e52e60df9c6a316e067dbfd7032e494d3634
    fixture_kind: vendored_full
  plane:
    repo: makeplane/plane
    commit: dc9d80b2d2a499b967f0b541e083b283f463719f
    ref: preview
    fixture_kind: vendored_full
  outline:
    repo: outline/outline
    commit: 30730179b852d42da5078a9294f7d05a44f516b7
    ref: main
    fixture_kind: vendored_full
