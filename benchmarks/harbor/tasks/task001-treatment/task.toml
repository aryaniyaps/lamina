version = "1.0"

[metadata]
author_name = "LaminaBench"
category = "greenfield"
difficulty = "hard"
tags = ["lamina", "skillsbench-paired", "treatment"]
lamina_task_id = "task001"
lamina_arm = "treatment"
lamina_workflow = "design"

[verifier]
timeout_sec = 600.0

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
ANTHROPIC_AUTH_TOKEN = "${ANTHROPIC_AUTH_TOKEN}"
ANTHROPIC_BASE_URL = "${ANTHROPIC_BASE_URL}"
REWARDKIT_JUDGE = "${REWARDKIT_JUDGE}"
LAMINA_BENCH_RUN = "${LAMINA_BENCH_RUN}"

[agent]
timeout_sec = 5400.0

[environment]
build_timeout_sec = 1800.0
cpus = 2
memory = "4G"
storage = "10G"
allow_internet = true
