schema_version = "1.3"
multi_step_reward_strategy = "final"

[task]
name = "aryaniyaps/control-simple-list-direct"
description = "Lamina works behavior benchmark: control-simple-list (direct)"
authors = [{ name = "LaminaBench" }]
keywords = ["fuzzy-prompt", "product-shaping", "behavior-oracle", "direct"]

[metadata]
benchmark = "lamina-product-shaping"
benchmark_version = "harbor-v4"
task_id = "control-simple-list"
arm = "direct"
kind = "greenfield-low-risk"
stage = "spark"

[agent]
timeout_sec = 4200.0

[environment]
network_mode = "public"
build_timeout_sec = 180.0
workdir = "/app"
os = "linux"
cpus = 4
memory_mb = 8192
storage_mb = 20480

[[steps]]
name = "shape_build"
min_reward = 0.0
[steps.agent]
timeout_sec = 2100.0
[steps.verifier]
timeout_sec = 60.0

[[steps]]
name = "verify_fix"
min_reward = 0.0
[steps.agent]
timeout_sec = 2100.0
[steps.verifier]
timeout_sec = 60.0
