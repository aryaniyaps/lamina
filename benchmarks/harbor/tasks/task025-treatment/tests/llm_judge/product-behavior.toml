[judge]
judge = "anthropic/claude-sonnet-4-20250514"
files = ["/logs/verifier/implementation.md"]
reference = "/tests/judge-context.md"
prompt_template = "/tests/llm_judge/prompt.md"
timeout = 300
weight = 1.0

[[criterion]]
name = "domain_system_structure"
description = "Domain / system structure — entities and relationships expressed in code (types, models, modules); not a UI shell without domain logic"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "invariants_product_rules"
description = "Invariants and product rules — illegal states prevented or rejected in code; guards, validation, or state machines — not comments alone"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "actors_permissions"
description = "Actors and permissions — role checks, authorization boundaries, or data scoping visible in implementation"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "workflow_quality"
description = "Workflow quality — a primary journey implemented end-to-end with coherent state transitions"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "scenario_edge_coverage"
description = "Scenario / edge coverage — failure, recovery, or edge paths handled (errors, retries, empty states, idempotency where relevant)"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "systems_judgment"
description = "Systems judgment — structure reflects sensible trade-offs; avoids obvious product traps (e.g. silent data loss, permission leaks)"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "ux_expression_under_rules"
description = "UX expression under rules — UI or API surfaces reflect domain rules (errors, empty states, a11y hooks where present)"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "brownfield_fit"
description = "Brownfield fit — integrates sensibly with existing fixture code (N/A for greenfield → score internal consistency)"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "implementation_readiness"
description = "Implementation readiness — product implementation is coherent and buildable; clear entry points; not a stub-only scaffold"
type = "likert"
points = 5
weight = 1.0

[[criterion]]
name = "overall_product_behavior"
description = "Overall product-behavior quality — holistic judgment of product behavior as expressed in code"
type = "likert"
points = 5
weight = 1.0

[scoring]
aggregation = "weighted_mean"
