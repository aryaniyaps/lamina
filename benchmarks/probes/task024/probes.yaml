task_id: task024
version: 1.0.0
probes:
  - id: inv_unsaved_work_preserved_on_reauth
    kind: code_guard
    description: "Invariant \"unsaved work preserved on reauth\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(unsaved[\\s_-]*work[\\s_-]*preserved[\\s_-]*reauth).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(unsaved[\\s_-]*work[\\s_-]*preserved[\\s_-]*reauth)"
