task_id: task023
version: 1.0.0
probes:
  - id: inv_error_distinct_from_empty
    kind: code_guard
    description: "Invariant \"error distinct from empty\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(error[\\s_-]*distinct[\\s_-]*from[\\s_-]*empty).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(error[\\s_-]*distinct[\\s_-]*from[\\s_-]*empty)"
