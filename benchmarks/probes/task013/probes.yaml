task_id: task013
version: 1.0.0
probes:
  - id: inv_document_permissions_bounded_by_collection
    kind: code_guard
    description: "Invariant \"document permissions bounded by collection\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(document[\\s_-]*permissions[\\s_-]*bounded[\\s_-]*collection).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(document[\\s_-]*permissions[\\s_-]*bounded[\\s_-]*collection)"
