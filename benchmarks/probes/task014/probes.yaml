task_id: task014
version: 1.0.0
probes:
  - id: inv_cart_total_matches_items
    kind: code_guard
    description: "Invariant \"cart total matches items\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(cart[\\s_-]*total[\\s_-]*matches[\\s_-]*items).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(cart[\\s_-]*total[\\s_-]*matches[\\s_-]*items)"
  - id: inv_out_of_stock_not_checkoutable
    kind: code_guard
    description: "Invariant \"out of stock not checkoutable\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(out[\\s_-]*stock[\\s_-]*not[\\s_-]*checkoutable).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(out[\\s_-]*stock[\\s_-]*not[\\s_-]*checkoutable)"
  - id: ent_cart
    kind: entity_model
    description: "Entity \"cart\" in type/model context"
    weight: 1
    patterns:
      - "(?is)(type|interface|class|struct|model|schema|entity|record|enum|typedef)[\\s\\w{:,<]*cart|(?is)cart[\\s\\w]*({|struct|class|interface|=)"
  - id: ent_cart_item
    kind: entity_model
    description: "Entity \"cart item\" in type/model context"
    weight: 1
    patterns:
      - "(?is)(type|interface|class|struct|model|schema|entity|record|enum|typedef)[\\s\\w{:,<]*cart[\\s_-]*item|(?is)cart[\\s_-]*item[\\s\\w]*({|struct|class|interface|=)"
  - id: ent_product
