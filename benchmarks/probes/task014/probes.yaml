  - id: has_executable_slice
    kind: code_guard
    description: Contains function/class/export definitions
    weight: 1
    patterns:
      - "\\b(export\\s+(async\\s+)?function|export\\s+class|def\\s+\\w+|function\\s+\\w+|class\\s+\\w+)\\b"
