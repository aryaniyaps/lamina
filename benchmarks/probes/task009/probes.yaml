task_id: task009
version: 1.0.0
probes:
  - id: inv_max_saved_searches_enforced
    kind: code_guard
    description: "Invariant \"max saved searches enforced\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(max[\\s_-]*saved[\\s_-]*searches[\\s_-]*enforced).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(max[\\s_-]*saved[\\s_-]*searches[\\s_-]*enforced)"
  - id: inv_filter_snapshot_immutable_until_edit
