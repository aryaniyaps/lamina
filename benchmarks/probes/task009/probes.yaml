  - id: ent_saved_search
    kind: entity_model
    description: "Entity \"saved search\" in type/model context"
    weight: 1
    patterns:
      - "(?is)(type|interface|class|struct|model|schema|entity|record|enum|typedef)[\\s\\w{:,<]*saved[\\s_-]*search|(?is)saved[\\s_-]*search[\\s\\w]*({|struct|class|interface|=)"
