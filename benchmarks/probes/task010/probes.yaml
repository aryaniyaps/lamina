task_id: task010
version: 1.0.0
probes:
  - id: inv_permission_check_per_issue
    kind: code_guard
    description: "Invariant \"permission check per issue\" with guard/validation"
    weight: 2
    patterns:
      - "(?is)(permission[\\s_-]*check[\\s_-]*per[\\s_-]*issue).{0,120}(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant)|(?is)(if|throw|assert|require|guard|validate|forbid|reject|cannot|must|ensure|check|deny|unauthorized|forbidden|invariant).{0,120}(permission[\\s_-]*check[\\s_-]*per[\\s_-]*issue)"
