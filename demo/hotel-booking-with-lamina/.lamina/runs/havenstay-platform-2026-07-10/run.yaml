decisions:
  - id: checkout-hold-duration
    choice: 15-minute inventory hold during checkout
    rationale: Balance fairness (don't lock inventory indefinitely) vs payment time
    run_ref: havenstay-platform-2026-07-10

  - id: cancellation-policy-templates
    choice: Three platform templates (flexible/moderate/strict); hotel picks one per property
    rationale: Simplifies v1; avoids free-form policy parsing; snapshot at booking
    run_ref: havenstay-platform-2026-07-10

  - id: hotel-payout-timing
    choice: Payout after check-in date via Stripe Connect
    rationale: Reduces chargeback exposure; aligns with cancellation windows
    run_ref: havenstay-platform-2026-07-10

  - id: search-default-sort
    choice: Recommended (blend of rating, booking conversion, distance when geo known)
    rationale: Differentiation vs pure price-sort OTAs; tunable post-launch
    run_ref: havenstay-platform-2026-07-10

  - id: single-traveler-account-model
    choice: Leisure and business travelers share account model; receipt download satisfies expense needs
    rationale: Corporate travel out of scope; avoids duplicate auth systems
    run_ref: havenstay-platform-2026-07-10

  - id: property-approval-gate
    choice: Manual platform admin approval before go-live
    rationale: Trust and quality for boutique positioning; cold-start acceptable at 300 hotel target
    run_ref: havenstay-platform-2026-07-10

  - id: no-guest-messaging-v1
    choice: No in-app guest-hotel messaging; surface hotel contact on reservation
    rationale: Scope control; email/phone sufficient for v1; reduces moderation burden
    run_ref: havenstay-platform-2026-07-10

  - id: hotel-onboarding-self-serve
    choice: Fully self-serve hotel onboarding via public List your property flow; no sales-assisted path in v1
    rationale: Stakeholder decision 2026-07-10; reduces supply friction and ops overhead at launch
    run_ref: havenstay-platform-2026-07-10

  - id: platform-admin-full-console
    choice: Full platform admin web console — dashboard, approvals, users, hotels, bookings, payments/payouts, trust, reviews, support, config, audit and notification logs
    rationale: Stakeholder decision 2026-07-10; maximize operational depth for marketplace governance
    run_ref: havenstay-platform-2026-07-10

open_questions:
